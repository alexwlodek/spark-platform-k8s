apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.certificate.issuerName }}
spec:
  acme:
    email: {{ .Values.certificate.issuerEmail | quote }}
    server: {{ .Values.certificate.acmeServer | quote }}
    privateKeySecretRef:
      name: {{ .Values.certificate.issuerPrivateKeySecretName }}
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: {{ .Values.cloudflare.apiTokenSecretName }}
              key: {{ .Values.cloudflare.apiTokenSecretKey }}
