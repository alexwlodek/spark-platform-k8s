image:
  repository: ghcr.io/projectnessie/nessie
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 19120
  managementPort: 9000

nessie:
  versionStoreType: JDBC2
  defaultBranch: main

database:
  existingSecret: ""
  host: storage-nessie-db.apps.svc.cluster.local
  port: 5432
  name: nessie
  username: nessie

serviceAccount:
  create: false
  name: ""
  annotations: {}
  automountServiceAccountToken: true

cloudSqlProxy:
  enabled: false
  image:
    repository: gcr.io/cloud-sql-connectors/cloud-sql-proxy
    tag: "2.18.3"
    pullPolicy: IfNotPresent
  instanceConnectionName: ""
  port: 5432
  privateIP: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi

resources:
  requests:
    cpu: 150m
    memory: 512Mi
  limits:
    cpu: 600m
    memory: 1536Mi

probes:
  liveness:
    initialDelaySeconds: 20
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 6
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 12
