apiVersion: v1
kind: Service
metadata:
  name: {{ include "bi-metabase.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "bi-metabase.labels" . | indent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    app.kubernetes.io/name: {{ include "bi-metabase.name" . | quote }}
