apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bi-metabase.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "bi-metabase.labels" . | indent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name | quote }}
      app.kubernetes.io/name: {{ include "bi-metabase.name" . | quote }}
  template:
    metadata:
      labels:
{{ include "bi-metabase.labels" . | indent 8 }}
    spec:
      containers:
        - name: metabase
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: MB_JETTY_PORT
              value: {{ .Values.service.port | quote }}
            - name: MB_DB_TYPE
              value: h2
            - name: MB_DB_FILE
              value: /metabase-data/metabase.db
            - name: MB_JAVA_TIMEZONE
              value: {{ .Values.metabase.javaTimeZone | quote }}
{{- if .Values.metabase.siteUrl }}
            - name: MB_SITE_URL
              value: {{ .Values.metabase.siteUrl | quote }}
{{- end }}
{{- if .Values.metabase.encryptionSecretKey }}
            - name: MB_ENCRYPTION_SECRET_KEY
              value: {{ .Values.metabase.encryptionSecretKey | quote }}
{{- end }}
{{- with .Values.metabase.extraEnv }}
{{ toYaml . | indent 12 }}
{{- end }}
          volumeMounts:
            - name: metabase-data
              mountPath: /metabase-data
          resources:
{{ toYaml .Values.resources | indent 12 }}
          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
      volumes:
        - name: metabase-data
{{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "bi-metabase.fullname" . }}
{{- else }}
          emptyDir: {}
{{- end }}
