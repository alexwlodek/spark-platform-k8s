{{- $baseCatalogs := (default (dict) .Values.trino.catalogs) -}}
{{- $additionalCatalogs := (default (dict) .Values.trino.additionalCatalogs) -}}
{{- $catalogs := merge (deepCopy $baseCatalogs) $additionalCatalogs -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bi-trino.fullname" . }}-catalogs
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "bi-trino.labels" . | indent 4 }}
data:
{{- range $name, $config := $catalogs }}
  {{ $name }}.properties: |
{{ $config | indent 4 }}
{{- end }}
