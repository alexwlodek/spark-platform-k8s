# DEV overrides (np. persistence off na kind)
grafana:
  admin:
    existingSecret: platform-grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  persistence:
    enabled: false
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.127.0.0.1.nip.io

prometheus:
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - prometheus.127.0.0.1.nip.io
  prometheusSpec:
    storageSpec: {}
