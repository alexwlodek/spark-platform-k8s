# DEV overrides (kind)
global:
  domain: argocd.127.0.0.1.nip.io

configs:
  cm:
    url: http://argocd.127.0.0.1.nip.io:8080
  params:
    server.insecure: true

redisSecretInit:
  enabled: true

server:
  service:
    type: ClusterIP
  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: argocd.127.0.0.1.nip.io
