generator:
  enabled: true
  replicas: 1
  image:
    repository: ghcr.io/alexwlodek/order-generator
    tag: "latest"
    pullPolicy: IfNotPresent
  orderRatePerSecond: 20
  minAmount: 10
  maxAmount: 500
  minItems: 1
  maxItems: 4
  seed: 42
  scenarioProfile: balanced
  failureProfile: balanced
  paymentFailureRate: 0.12
  inventoryShortageRate: 0.05
  shipmentDelayRate: 0.08
  refundRate: 0.03
  suspiciousOrderRate: 0.02
  logLevel: INFO
  environment: dev
  emitSummaryEveryN: 25
  metricsPort: 9108
  healthPort: 8081
  kafka:
    bootstrapServers: streaming-kafka.apps.svc.cluster.local:9092
    orderLifecycleTopic: commerce.order.lifecycle.v1
    paymentEventsTopic: commerce.payment.events.v1
    inventoryEventsTopic: commerce.inventory.events.v1
    shipmentEventsTopic: commerce.shipment.events.v1
    refundEventsTopic: commerce.refund.events.v1
    riskEventsTopic: commerce.risk.events.v1
    technicalEventsTopic: commerce.generator.technical.v1
    acks: all
    compressionType: none
    publishTimeoutSeconds: 10
    manualRetries: 3
    retryBackoffSeconds: 1
  service:
    enabled: true
    type: ClusterIP
  monitoring:
    podMonitor:
      enabled: true
      namespace: ""
      labels:
        release: kube-prometheus-stack
      interval: 15s
      scrapeTimeout: 10s
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

sparkApplication:
  enabled: true
  labels: {}
  annotations: {}
  type: Python
  mode: cluster
  sparkVersion: "3.5.2"
  pythonVersion: "3"
  mainApplicationFile: local:///opt/spark/work-dir/streaming_job.py
  image:
    repository: ghcr.io/alexwlodek/spark-demo-job
    tag: "latest"
    pullPolicy: IfNotPresent
  arguments:
    - --kafka-bootstrap-servers
    - streaming-kafka.apps.svc.cluster.local:9092
    - --kafka-topic
    - commerce.order.lifecycle.v1,commerce.payment.events.v1,commerce.inventory.events.v1,commerce.shipment.events.v1,commerce.refund.events.v1,commerce.risk.events.v1,commerce.generator.technical.v1
    - --starting-offsets
    - latest
    - --window-duration
    - 1 minute
    - --watermark-delay
    - 2 minutes
    - --checkpoint-location
    - s3a://streaming-lake/checkpoints/commerce-events-v1
    - --bronze-table
    - iceberg_nessie.streaming.bronze_commerce_events
    - --quarantine-table
    - iceberg_nessie.streaming.quarantine_commerce_events
    - --silver-events-table
    - iceberg_nessie.streaming.silver_order_events
    - --silver-order-state-table
    - iceberg_nessie.streaming.silver_order_state
    - --silver-payments-table
    - iceberg_nessie.streaming.silver_payments
    - --silver-shipments-table
    - iceberg_nessie.streaming.silver_shipments
    - --silver-refunds-table
    - iceberg_nessie.streaming.silver_refunds
    - --gold-table
    - iceberg_nessie.streaming.gold_order_metrics_minute
    - --gold-funnel-table
    - iceberg_nessie.streaming.gold_order_funnel_daily
    - --gold-payment-failure-table
    - iceberg_nessie.streaming.gold_payment_failure_rate_hourly
    - --gold-revenue-refund-table
    - iceberg_nessie.streaming.gold_revenue_refund_daily
    - --query-name
    - commerce_events_streaming
    - --trigger-processing-time
    - 10 seconds
    - --metrics-port
    - "8090"
  sparkConf:
    spark.ui.prometheus.enabled: "true"
    spark.sql.shuffle.partitions: "2"
    spark.sql.streaming.metricsEnabled: "true"
    spark.jars.ivy: /tmp/.ivy2
    spark.jars.packages: org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.2,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262,org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.6.1,org.apache.iceberg:iceberg-aws-bundle:1.6.1
    spark.sql.extensions: org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
    spark.sql.catalog.iceberg_nessie: org.apache.iceberg.spark.SparkCatalog
    spark.sql.catalog.iceberg_nessie.catalog-impl: org.apache.iceberg.nessie.NessieCatalog
    spark.sql.catalog.iceberg_nessie.uri: http://storage-nessie.apps.svc.cluster.local:19120/api/v2
    spark.sql.catalog.iceberg_nessie.ref: main
    spark.sql.catalog.iceberg_nessie.authentication.type: NONE
    spark.sql.catalog.iceberg_nessie.warehouse: s3://streaming-lake/iceberg
    spark.sql.catalog.iceberg_nessie.io-impl: org.apache.iceberg.aws.s3.S3FileIO
    spark.sql.catalog.iceberg_nessie.s3.endpoint: http://storage-minio.apps.svc.cluster.local:9000
    spark.sql.catalog.iceberg_nessie.s3.path-style-access: "true"
    spark.sql.catalog.iceberg_nessie.s3.region: eu-central-1
    spark.sql.catalog.iceberg_nessie.client.region: eu-central-1
    spark.hadoop.fs.s3a.impl: org.apache.hadoop.fs.s3a.S3AFileSystem
    spark.hadoop.fs.s3a.endpoint: http://storage-minio.apps.svc.cluster.local:9000
    spark.hadoop.fs.s3a.path.style.access: "true"
    spark.hadoop.fs.s3a.connection.ssl.enabled: "false"
    spark.hadoop.fs.s3a.aws.credentials.provider: com.amazonaws.auth.EnvironmentVariableCredentialsProvider
  restartPolicy:
    type: OnFailure
    onFailureRetries: 3
    onFailureRetryInterval: 30
    onSubmissionFailureRetries: 5
    onSubmissionFailureRetryInterval: 20
  driver:
    cores: 1
    coreLimit: "1200m"
    memory: "1024m"
    serviceAccount: spark-operator-spark
    ports:
      - name: metrics
        containerPort: 8090
        protocol: TCP
    labels:
      streaming-query: commerce-events-streaming
    env:
      - name: PYTHONUNBUFFERED
        value: "1"
      - name: AWS_REGION
        value: "eu-central-1"
      - name: AWS_DEFAULT_REGION
        value: "eu-central-1"
  executor:
    instances: 1
    cores: 1
    coreLimit: "1200m"
    memory: "1024m"
    deleteOnTermination: true
    labels:
      streaming-query: commerce-events-streaming
    env:
      - name: AWS_REGION
        value: "eu-central-1"
      - name: AWS_DEFAULT_REGION
        value: "eu-central-1"

metrics:
  podMonitor:
    enabled: true
    namespace: ""
    labels:
      release: kube-prometheus-stack
    interval: 15s
    scrapeTimeout: 10s
    selector:
      sparkRole: driver
      streamingQuery: commerce-events-streaming
    endpoints:
      - path: /metrics/executors/prometheus
        targetPort: 4040
      - path: /metrics
        targetPort: 8090

grafanaDashboard:
  enabled: true
  namespace: ""
  labels: {}

generatorGrafanaDashboard:
  enabled: true
  namespace: ""
  labels: {}

prometheusRule:
  enabled: true
  namespace: ""
  labels:
    release: kube-prometheus-stack
  queryLabel: commerce_events_streaming
  alerts:
    jobFailed:
      enabled: true
      for: 5m
    lagGrowing:
      enabled: true
      for: 10m
      thresholdSeconds: 120

generatorPrometheusRule:
  enabled: true
  namespace: ""
  labels:
    release: kube-prometheus-stack
  alerts:
    noOrders:
      enabled: true
      for: 5m
    schemaFailures:
      enabled: true
      for: 1m
    publishFailureRatio:
      enabled: true
      for: 10m
      threshold: 0.02
