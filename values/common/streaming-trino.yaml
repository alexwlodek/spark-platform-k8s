image:
  repository: trinodb/trino
  tag: "477"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

trino:
  nodeEnvironment: dev
  dataDir: /data/trino
  jvm:
    maxHeapSize: 1G
  config:
    queryMaxMemory: 1GB
    queryMaxMemoryPerNode: 512MB
  catalogs:
    tpch: |
      connector.name=tpch
    memory: |
      connector.name=memory
  # Example when metastore is available (future step):
  # additionalCatalogs:
  #   hive_minio: |
  #     connector.name=hive
  #     hive.metastore.uri=thrift://hive-metastore.apps.svc.cluster.local:9083
  #     fs.native-s3.enabled=true
  #     s3.endpoint=http://streaming-minio.apps.svc.cluster.local:9000
  #     s3.path-style-access=true
  #     s3.aws-access-key=minio
  #     s3.aws-secret-key=minio123
  #     s3.region=us-east-1
  additionalCatalogs: {}

persistence:
  enabled: false
  size: 8Gi
  storageClassName: ""
  accessModes:
    - ReadWriteOnce

resources:
  requests:
    cpu: 300m
    memory: 768Mi
  limits:
    cpu: "1"
    memory: 2Gi

probes:
  liveness:
    initialDelaySeconds: 20
    periodSeconds: 20
    timeoutSeconds: 2
    failureThreshold: 6
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 12
