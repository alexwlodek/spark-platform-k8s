replicaCount: 1

image:
  repository: metabase/metabase
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000

persistence:
  enabled: true
  size: 5Gi
  storageClassName: ""
  accessModes:
    - ReadWriteOnce

metabase:
  siteUrl: ""
  javaTimeZone: Europe/Warsaw
  encryptionSecretKey: ""
  extraEnv: []

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1536Mi

probes:
  startup:
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30
  liveness:
    initialDelaySeconds: 60
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 6
  readiness:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 12
