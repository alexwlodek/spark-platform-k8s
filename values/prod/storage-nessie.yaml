database:
  host: 127.0.0.1
  port: 5432
  name: nessie
  existingSecret: platform-nessie-creds

serviceAccount:
  create: true
  name: storage-nessie
  annotations:
    iam.gke.io/gcp-service-account: nessie-runtime@data-platform-prod-491113.iam.gserviceaccount.com

cloudSqlProxy:
  enabled: true
  instanceConnectionName: data-platform-prod-491113:europe-central2:data-platform-prod-nessie
  privateIP: true

resources:
  requests:
    cpu: 250m
    memory: 768Mi
  limits:
    cpu: "1"
    memory: 2Gi
