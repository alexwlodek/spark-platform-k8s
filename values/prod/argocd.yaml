# PROD overrides for GKE.
global:
  domain: argocd.prod.example.com

configs:
  secret:
    # bootstrap-argocd.sh seeds server.secretkey until the GCP ExternalSecret reconciles.
    createSecret: false
  cm:
    url: https://argocd.prod.example.com
  params:
    # GKE Ingress terminates TLS at the load balancer in phase 1.
    server.insecure: true

redisSecretInit:
  enabled: true

server:
  service:
    type: NodePort
  ingress:
    enabled: true
    hostname: argocd.prod.example.com
    annotations:
      kubernetes.io/ingress.class: gce
      kubernetes.io/ingress.allow-http: "true"
      kubernetes.io/ingress.global-static-ip-name: argocd-prod-ip
      networking.gke.io/managed-certificates: argocd-prod
      networking.gke.io/v1beta1.FrontendConfig: argocd-frontend-config
