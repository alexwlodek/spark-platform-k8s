# PROD overrides for GKE.
global:
  domain: argocd.prod.alexwlodek.com

configs:
  secret:
    # bootstrap-argocd.sh seeds server.secretkey until the GCP ExternalSecret reconciles.
    createSecret: false
  cm:
    url: https://argocd.prod.alexwlodek.com
  params:
    # GKE Ingress terminates TLS at the load balancer in phase 1.
    server.insecure: true

redisSecretInit:
  enabled: true

server:
  service:
    type: ClusterIP
  ingress:
    enabled: false
