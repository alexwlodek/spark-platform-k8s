generator:
  # Prod path expects external producers by default.
  enabled: false
  kafka:
    # Replace with the managed Kafka bootstrap servers used in production.
    bootstrapServers: kafka-bootstrap.prod.alexwlodek.internal:9092

sparkApplication:
  image:
    pullPolicy: IfNotPresent
  arguments:
    - --kafka-bootstrap-servers
    - kafka-bootstrap.prod.alexwlodek.internal:9092
    - --kafka-topic
    - commerce.order.lifecycle.v1,commerce.payment.events.v1,commerce.inventory.events.v1,commerce.shipment.events.v1,commerce.refund.events.v1,commerce.risk.events.v1,commerce.generator.technical.v1
    - --starting-offsets
    - latest
    - --window-duration
    - 1 minute
    - --watermark-delay
    - 2 minutes
    - --checkpoint-location
    - gs://data-platform-prod-lake/checkpoints/commerce-events-v1
    - --bronze-table
    - iceberg_nessie.streaming.bronze_commerce_events
    - --quarantine-table
    - iceberg_nessie.streaming.quarantine_commerce_events
    - --silver-events-table
    - iceberg_nessie.streaming.silver_order_events
    - --silver-order-state-table
    - iceberg_nessie.streaming.silver_order_state
    - --silver-payments-table
    - iceberg_nessie.streaming.silver_payments
    - --silver-shipments-table
    - iceberg_nessie.streaming.silver_shipments
    - --silver-refunds-table
    - iceberg_nessie.streaming.silver_refunds
    - --gold-table
    - iceberg_nessie.streaming.gold_order_metrics_minute
    - --gold-funnel-table
    - iceberg_nessie.streaming.gold_order_funnel_daily
    - --gold-payment-failure-table
    - iceberg_nessie.streaming.gold_payment_failure_rate_hourly
    - --gold-revenue-refund-table
    - iceberg_nessie.streaming.gold_revenue_refund_daily
    - --query-name
    - commerce_events_streaming
    - --trigger-processing-time
    - 10 seconds
    - --metrics-port
    - "8090"
  sparkConf:
    spark.jars.packages: org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.2,com.google.cloud.bigdataoss:gcs-connector:hadoop3-2.2.28,org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.6.1,org.apache.iceberg:iceberg-gcp-bundle:1.6.1
    spark.sql.catalog.iceberg_nessie.uri: http://storage-nessie.apps.svc.cluster.local:19120/api/v2
    spark.sql.catalog.iceberg_nessie.warehouse: gs://data-platform-prod-lake/iceberg
    spark.sql.catalog.iceberg_nessie.io-impl: org.apache.iceberg.gcp.gcs.GCSFileIO
    spark.hadoop.fs.gs.impl: com.google.cloud.hadoop.fs.gcs.GoogleHadoopFileSystem
    spark.hadoop.fs.AbstractFileSystem.gs.impl: com.google.cloud.hadoop.fs.gcs.GoogleHadoopFS
    spark.hadoop.fs.gs.project.id: data-platform-prod-491113
    spark.hadoop.fs.gs.auth.type: APPLICATION_DEFAULT
  driver:
    serviceAccount: spark-operator-spark
    memory: "2g"
    env:
      - name: PYTHONUNBUFFERED
        value: "1"
  executor:
    instances: 2
    memory: "2g"
    env: []
