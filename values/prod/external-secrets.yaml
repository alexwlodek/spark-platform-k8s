# EKS/PROD phase 2 overrides.
replicaCount: 2

serviceAccount:
  create: true
  name: external-secrets
  annotations:
    # Replace with the Terraform output role ARN.
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/data-platform-prod-external-secrets

serviceMonitor:
  # Enable once kube-prometheus-stack is deployed in prod.
  enabled: false
