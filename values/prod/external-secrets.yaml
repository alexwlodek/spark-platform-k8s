# PROD overrides for External Secrets on GKE.
replicaCount: 2

serviceAccount:
  create: true
  name: external-secrets
  annotations:
    # Replace with the GCP service account allowed to read Secret Manager.
    iam.gke.io/gcp-service-account: external-secrets@data-platform-prod-491113.iam.gserviceaccount.com

serviceMonitor:
  enabled: true
