trino:
  nodeEnvironment: prod
  additionalCatalogs:
    iceberg_nessie: |
      connector.name=iceberg
      iceberg.catalog.type=nessie
      iceberg.nessie-catalog.uri=http://storage-nessie.apps.svc.cluster.local:19120/api/v2
      iceberg.nessie-catalog.ref=main
      iceberg.nessie-catalog.default-warehouse-dir=s3://data-platform-prod-lake/iceberg
      fs.native-s3.enabled=true
      s3.endpoint=s3.amazonaws.com
      s3.path-style-access=false
      s3.region=eu-central-1
      s3.aws-access-key=${ENV:TRINO_S3_ACCESS_KEY}
      s3.aws-secret-key=${ENV:TRINO_S3_SECRET_KEY}

extraEnv:
  - name: TRINO_S3_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: platform-trino-s3-creds
        key: access-key-id
  - name: TRINO_S3_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: platform-trino-s3-creds
        key: secret-access-key

persistence:
  enabled: true
  size: 50Gi

resources:
  requests:
    cpu: 600m
    memory: 1536Mi
  limits:
    cpu: "2"
    memory: 4Gi
