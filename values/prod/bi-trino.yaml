image:
  tag: "479"

trino:
  nodeEnvironment: prod
  additionalCatalogs:
    iceberg_nessie: |
      connector.name=iceberg
      iceberg.catalog.type=nessie
      iceberg.nessie-catalog.uri=http://storage-nessie.apps.svc.cluster.local:19120/api/v2
      iceberg.nessie-catalog.ref=main
      iceberg.nessie-catalog.default-warehouse-dir=gs://data-platform-prod-lake/iceberg
      fs.native-gcs.enabled=true
      gcs.project-id=data-platform-prod-491113
      gcs.auth-type=APPLICATION_DEFAULT

serviceAccount:
  create: true
  name: bi-trino
  annotations:
    iam.gke.io/gcp-service-account: lake-runtime@data-platform-prod-491113.iam.gserviceaccount.com

persistence:
  enabled: true
  size: 50Gi

resources:
  requests:
    cpu: 600m
    memory: 1536Mi
  limits:
    cpu: "2"
    memory: 4Gi
