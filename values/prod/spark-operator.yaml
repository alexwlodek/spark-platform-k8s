# GKE/PROD runtime config for Spark jobs that use Workload Identity.
replicaCount: 2

webhook:
  enable: true

spark:
  jobNamespaces:
    - apps
    - spark-operator
  serviceAccount:
    name: spark-operator-spark
    annotations:
      iam.gke.io/gcp-service-account: lake-runtime@data-platform-prod-491113.iam.gserviceaccount.com

prometheus:
  metrics:
    enable: true
  podMonitor:
    create: true

resources:
  requests:
    cpu: 200m
    memory: 384Mi
  limits:
    cpu: "1"
    memory: 1Gi
