apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-public-proxy-nginx
  namespace: argocd
data:
  default.conf: |
    map $http_upgrade $connection_upgrade {
      default upgrade;
      '' close;
    }

    server {
      listen 8080;
      server_name _;

      location = /healthz {
        default_type text/plain;
        return 200 'ok';
      }

      location / {
        proxy_pass http://argocd-server.argocd.svc.cluster.local:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-public-proxy
  namespace: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-public-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-public-proxy
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-conf
          configMap:
            name: argocd-public-proxy-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-public-proxy
  namespace: argocd
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: argocd-public-proxy
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: 8080
