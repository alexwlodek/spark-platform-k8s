apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: security-external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "80"
spec:
  project: platform
  sources:
    - repoURL: https://charts.external-secrets.io
      chart: external-secrets
      targetRevision: 1.3.2
      helm:
        releaseName: external-secrets
        valueFiles:
          - $values/values/common/external-secrets.yaml
          - $values/values/prod/external-secrets.yaml
    - repoURL: https://github.com/alexwlodek/spark-platform-k8s.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  # Manual sync by design while prod cluster bootstrap remains staged.
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
