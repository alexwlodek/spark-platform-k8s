apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: security-gcp-secretmanager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "81"
spec:
  project: platform
  source:
    repoURL: https://github.com/alexwlodek/spark-platform-k8s.git
    targetRevision: main
    path: clusters/prod/security/gcp-secretmanager
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  # Manual sync by design while prod cluster bootstrap remains staged.
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
