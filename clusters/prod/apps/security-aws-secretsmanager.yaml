apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: security-aws-secretsmanager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "81"
spec:
  project: platform
  source:
    repoURL: https://github.com/alexwlodek/spark-platform-k8s.git
    targetRevision: main
    path: clusters/prod/security/aws-secretsmanager
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  # Phase 2: manual sync by design.
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
