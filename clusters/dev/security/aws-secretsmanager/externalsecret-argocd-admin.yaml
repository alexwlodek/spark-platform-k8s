apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-admin-credentials
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "23"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secretsmanager
  target:
    name: argocd-secret
    creationPolicy: Merge
    deletionPolicy: Retain
  data:
    - secretKey: admin.password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: /spark-platform/dev/argocd
        metadataPolicy: None
        property: admin-password-bcrypt
    - secretKey: admin.passwordMtime
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: /spark-platform/dev/argocd
        metadataPolicy: None
        property: admin-password-mtime
