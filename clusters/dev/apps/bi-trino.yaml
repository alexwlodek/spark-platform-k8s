apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bi-trino
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "34"
spec:
  project: platform
  sources:
    - repoURL: https://github.com/alexwlodek/spark-platform-k8s.git
      targetRevision: main
      path: charts/bi-trino
      helm:
        releaseName: bi-trino
        valueFiles:
          - $values/values/common/bi-trino.yaml
          - $values/values/dev/bi-trino.yaml
    - repoURL: https://github.com/alexwlodek/spark-platform-k8s.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
