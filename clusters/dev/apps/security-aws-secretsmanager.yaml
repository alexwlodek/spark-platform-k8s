apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: security-aws-secretsmanager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "24"
spec:
  project: platform
  source:
    repoURL: https://github.com/alexwlodek/spark-platform-k8s.git
    targetRevision: main
    path: clusters/dev/security/aws-secretsmanager
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
